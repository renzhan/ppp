services:
  db:
    image: registry.cn-hangzhou.aliyuncs.com/qiluo-images/postgres:16.4
    container_name: ppp-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: abc.123.ABC
      POSTGRES_DB: ppp
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ppp-network

volumes:
  pgdata:

networks:
  ppp-network:
    name: ppp-network
    driver: bridge
