[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log

[program:nextjs]
command=npx next start -p 3000
directory=/app/web
autostart=true
autorestart=true
startsecs=5
stderr_logfile=/var/log/nextjs.err.log
stdout_logfile=/var/log/nextjs.out.log

[program:presenton]
command=uvicorn api.main:app --host 127.0.0.1 --port 8000
directory=/app/presenton-api
autostart=true
autorestart=true
startsecs=5
stderr_logfile=/var/log/presenton.err.log
stdout_logfile=/var/log/presenton.out.log
