version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ppp-app:${IMAGE_TAG:-latest}
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - TZ=Asia/Shanghai
      - DATABASE_URL=postgresql://postgres:abc.123.ABC@ppp-postgres:5432/ppp?connection_limit=10
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-ppp-agent-mgmt-encryption-key-2024-change-in-production}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-5.1}
    volumes:
      - ./logs:/app/logs
      - ./data/uploads:/app/web/uploads
      - ./data/note-media:/app/web/public/note-media
    restart: unless-stopped
    networks:
      - ppp-network

networks:
  ppp-network:
    external: true
