version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PRESENTON_INTERNAL_URL=http://localhost:8000
    volumes:
      - ./prisma:/app/prisma:ro
      - app_data:/app_data
    restart: unless-stopped

volumes:
  app_data:
